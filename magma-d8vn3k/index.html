<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magma — DTS Internal Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a2340;
      min-height: 100vh;
      padding: 36px 24px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a2340;
    }
    header p {
      font-size: 0.82rem;
      color: #999;
      margin-top: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      text-decoration: none;
      color: #1a2340;
      padding: 22px 20px 18px;
      border-top: 3px solid #1a2340;
      transition: box-shadow 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      box-shadow: 0 4px 18px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-name {
      font-size: 1rem;
      font-weight: 700;
    }
    .card-count {
      font-size: 0.72rem;
      background: #f0f2f5;
      color: #666;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .card-divider {
      border: none;
      border-top: 1px solid #f0f2f5;
    }

    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
    }
    .card-label {
      color: #aaa;
      font-size: 0.72rem;
    }
    .card-value {
      color: #1a2340;
      font-weight: 500;
      font-size: 0.78rem;
      text-align: right;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-value.na {
      color: #ccc;
    }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 10px;
      letter-spacing: 0.3px;
    }
    .badge.open       { background: #e6f4ea; color: #1e7e34; }
    .badge.scheduled  { background: #fff3cd; color: #856404; }
    .badge.closed     { background: #e9ecef; color: #555; }
    .badge.none       { background: #f0f2f5; color: #bbb; }

    .card-footer {
      font-size: 0.7rem;
      color: #bbb;
      text-align: right;
    }

    .card-skeleton .card-value {
      color: #ddd;
    }

    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.72rem;
      color: #bbb;
    }
  </style>
</head>
<body>

  <header>
    <h1>Magma MES — DTS Internal Dashboard</h1>
    <p>Internal use only &mdash; <span id="ts"></span></p>
  </header>

  <div class="grid" id="grid"></div>

  <footer>Magma Group &copy; 2026</footer>

  <script>
    const customers = [
      { name: 'Tosaf',       slug: 'tosaf-54sfww' },
      { name: 'Elcam',       slug: 'elcam-bs3h7e' },
      { name: 'Ytong',       slug: 'ytong-qunmvy' },
      { name: 'Tama',        slug: 'tama-ij6mnp' },
      { name: 'Carmit',      slug: 'carmit-pys97q' },
      { name: 'Motorad',     slug: 'motorad-4yrxcm' },
      { name: 'Rav-Bariach', slug: 'rav-bariach-0ii743' },
      { name: 'Polybid',     slug: 'polybid-g90djj' },
      { name: 'Flex',        slug: 'flex-mestd8' },
      { name: 'Electra',     slug: 'electra-lg43m8' },
    ];

    const grid = document.getElementById('grid');

    // Timestamp
    document.getElementById('ts').textContent = new Date().toLocaleString('he-IL');

    function statusBadge(status) {
      if (!status) return `<span class="badge none">—</span>`;
      const s = status.toLowerCase();
      if (s === 'open')      return `<span class="badge open">OPEN</span>`;
      if (s === 'scheduled') return `<span class="badge scheduled">SCHEDULED</span>`;
      if (s === 'closed')    return `<span class="badge closed">CLOSED</span>`;
      return `<span class="badge none">${status}</span>`;
    }

    function val(v, fallback = '—') {
      return v ? `<span class="card-value">${v}</span>`
               : `<span class="card-value na">${fallback}</span>`;
    }

    function renderCard(customer, data) {
      const deployments = data?.deployments || [];
      const last = deployments.length > 0 ? deployments[deployments.length - 1] : null;

      // Find upcoming (open or scheduled, not closed)
      const upcoming = deployments.slice().reverse().find(
        d => d.status && d.status.toLowerCase() !== 'closed'
      );

      const count = deployments.length;
      const href  = `../${customer.slug}/`;

      const cardHtml = `
        <a class="card" href="${href}">
          <div class="card-header">
            <span class="card-name">${customer.name}</span>
            <span class="card-count">${count} DTS</span>
          </div>
          <hr class="card-divider" />

          <div class="card-row">
            <span class="card-label">Last DTS</span>
            ${last ? val(`#${last.ticketNumber} &nbsp;${truncate(last.title, 22)}`) : val(null)}
          </div>

          <div class="card-row">
            <span class="card-label">Status</span>
            <span>${last ? statusBadge(last.status) : statusBadge(null)}</span>
          </div>

          <div class="card-row">
            <span class="card-label">Created</span>
            ${val(last?.createDate)}
          </div>

          <div class="card-row">
            <span class="card-label">Deploy date</span>
            ${val(last?.deployDate, 'Not scheduled')}
          </div>

          <div class="card-row">
            <span class="card-label">Changes</span>
            ${val(last?.ticketCount ? `${last.ticketCount} tickets` : null)}
          </div>
        </a>
      `;
      return cardHtml;
    }

    function renderEmpty(customer) {
      return `
        <a class="card card-skeleton" href="../${customer.slug}/">
          <div class="card-header">
            <span class="card-name">${customer.name}</span>
            <span class="card-count">0 DTS</span>
          </div>
          <hr class="card-divider" />
          <div class="card-row">
            <span class="card-label" style="color:#ddd">No deployments yet</span>
          </div>
        </a>
      `;
    }

    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.slice(0, len) + '…' : str;
    }

    async function loadCustomer(customer) {
      try {
        const res = await fetch(`../${customer.slug}/data.json?_=${Date.now()}`);
        if (!res.ok) throw new Error('no data');
        const data = await res.json();
        return renderCard(customer, data);
      } catch {
        return renderEmpty(customer);
      }
    }

    async function init() {
      const cards = await Promise.all(customers.map(loadCustomer));
      grid.innerHTML = cards.join('');
    }

    init();
  </script>

</body>
</html>
