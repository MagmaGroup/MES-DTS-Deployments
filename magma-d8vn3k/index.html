<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magma — DTS Internal Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #eef1f5;
      color: #1a2340;
      min-height: 100vh;
    }

    /* ── Header — matches DTS report page ── */
    .page-header {
      background: #1a3a5c;
      color: #fff;
      padding: 36px 40px;
      text-align: center;
    }
    .page-header .brand {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .page-header .subtitle {
      font-size: 13px;
      opacity: 0.45;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }

    /* ── Grid ── */
    .grid-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 28px 64px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      text-decoration: none;
      color: #1a2340;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.18s;
    }
    .card:hover {
      box-shadow: 0 10px 28px rgba(0,0,0,0.13);
      transform: translateY(-3px);
    }

    .card-banner {
      height: 5px;
      flex-shrink: 0;
    }

    .card-body {
      padding: 20px 22px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    /* Card header row */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-name {
      font-size: 21px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .card-count {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: #eef1f5;
      color: #999;
      letter-spacing: 0.3px;
    }

    /* DTS title block */
    .dts-block {
      background: #f4f7fb;
      border-radius: 6px;
      padding: 10px 14px;
      border-left: 4px solid transparent;
    }
    .dts-num {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #aab;
      margin-bottom: 3px;
    }
    .dts-subject {
      font-size: 13px;
      font-weight: 600;
      color: #1a2340;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Divider + info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      padding-top: 12px;
      border-top: 1px solid #eef1f5;
    }
    .info-cell { display: flex; flex-direction: column; gap: 3px; }
    .info-label {
      font-size: 10px;
      color: #c0c8d4;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }
    .info-value {
      font-size: 13px;
      font-weight: 700;
      color: #1a2340;
    }
    .info-value.na { color: #ccc; font-weight: 400; }

    /* Status badges */
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.4px;
    }
    .badge.open      { background: #dcfce7; color: #166534; }
    .badge.scheduled { background: #fef3c7; color: #92400e; }
    .badge.closed    { background: #f1f5f9; color: #64748b; }
    .badge.none      { background: #f1f5f9; color: #c8d0dc; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 0 10px;
      gap: 8px;
    }
    .empty-icon {
      width: 32px;
      height: 32px;
      color: #d1d9e4;
    }
    .empty-text {
      font-size: 13px;
      color: #c8d0dc;
      font-weight: 500;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="brand">Magma MES &mdash; Internal Use Only</div>
    <h1>DTS Internal Dashboard</h1>
    <div class="subtitle">Live deployment status across all customers &nbsp;&middot;&nbsp; <span id="ts"></span></div>
    <div style="margin-top:16px;">
      <a href="editor.html" style="display:inline-block;background:rgba(255,255,255,0.12);color:#fff;font-size:12px;font-weight:600;letter-spacing:0.5px;padding:7px 18px;border-radius:6px;text-decoration:none;border:1px solid rgba(255,255,255,0.25);transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">
        &#9998; Edit DTS Content
      </a>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <footer>Magma Group &copy; 2026</footer>

  <script>
    const customers = [
      { name: 'Tosaf',       slug: 'tosaf-54sfww',       color: '#4f46e5' },
      { name: 'Elcam',       slug: 'elcam-bs3h7e',       color: '#0891b2' },
      { name: 'Ytong',       slug: 'ytong-qunmvy',       color: '#059669' },
      { name: 'Tama',        slug: 'tama-ij6mnp',        color: '#d97706' },
      { name: 'Carmit',      slug: 'carmit-pys97q',      color: '#dc2626' },
      { name: 'Motorad',     slug: 'motorad-4yrxcm',     color: '#7c3aed' },
      { name: 'Rav-Bariach', slug: 'rav-bariach-0ii743', color: '#0d9488' },
      { name: 'Polybid',     slug: 'polybid-g90djj',     color: '#ea580c' },
      { name: 'Flex',        slug: 'flex-mestd8',        color: '#be185d' },
      { name: 'Electra',     slug: 'electra-lg43m8',     color: '#1d4ed8' },
    ];

    document.getElementById('ts').textContent = new Date().toLocaleDateString('he-IL', {
      day: '2-digit', month: '2-digit', year: 'numeric'
    });

    const emptyIcon = `<svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026m-16.5 0a2.25 2.25 0 00-1.883 2.542l.857 6a2.25 2.25 0 002.227 1.932H19.05a2.25 2.25 0 002.227-1.932l.857-6a2.25 2.25 0 00-1.883-2.542m-16.5 0V6A2.25 2.25 0 016 3.75h3.879a1.5 1.5 0 011.06.44l2.122 2.12a1.5 1.5 0 001.06.44H18A2.25 2.25 0 0120.25 9v.776"/>
    </svg>`;

    function statusBadge(status) {
      if (!status) return `<span class="badge none">—</span>`;
      const s = status.toLowerCase();
      if (s === 'open')      return `<span class="badge open">Open</span>`;
      if (s === 'scheduled') return `<span class="badge scheduled">Scheduled</span>`;
      if (s === 'closed')    return `<span class="badge closed">Closed</span>`;
      return `<span class="badge none">${status}</span>`;
    }

    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.slice(0, len) + '…' : str;
    }

    function renderCard(customer, data) {
      const deployments = data?.deployments || [];
      const last = deployments.length > 0 ? deployments[deployments.length - 1] : null;
      const count = deployments.length;

      const top = `
        <a class="card" href="../${customer.slug}/">
          <div class="card-banner" style="background:${customer.color}"></div>
          <div class="card-body">
            <div class="card-header">
              <span class="card-name" style="color:${customer.color}">${customer.name}</span>
              <span class="card-count">${count} DTS</span>
            </div>`;

      if (!last) {
        return top + `
            <div class="empty-state">
              ${emptyIcon}
              <span class="empty-text">No deployments yet</span>
            </div>
          </div>
        </a>`;
      }

      return top + `
            <div class="dts-block" style="border-left-color:${customer.color}">
              <div class="dts-num">DTS #${last.ticketNumber}</div>
              <div class="dts-subject">${truncate(last.title, 48)}</div>
            </div>

            <div class="info-grid">
              <div class="info-cell">
                <span class="info-label">Status</span>
                <span>${statusBadge(last.status)}</span>
              </div>
              <div class="info-cell">
                <span class="info-label">Changes</span>
                <span class="info-value ${last.ticketCount ? '' : 'na'}">${last.ticketCount ? last.ticketCount + ' tickets' : '—'}</span>
              </div>
              <div class="info-cell">
                <span class="info-label">Created</span>
                <span class="info-value ${last.createDate ? '' : 'na'}">${last.createDate || '—'}</span>
              </div>
              <div class="info-cell">
                <span class="info-label">Deploy date</span>
                <span class="info-value ${last.deployDate ? '' : 'na'}">${last.deployDate || '—'}</span>
              </div>
            </div>
          </div>
        </a>`;
    }

    async function loadCustomer(customer) {
      try {
        const res = await fetch(`../${customer.slug}/data.json?_=${Date.now()}`);
        if (!res.ok) throw new Error('no data');
        const data = await res.json();
        return renderCard(customer, data);
      } catch {
        return renderCard(customer, null);
      }
    }

    async function init() {
      const cards = await Promise.all(customers.map(loadCustomer));
      document.getElementById('grid').innerHTML = cards.join('');
    }

    init();
  </script>

</body>
</html>
