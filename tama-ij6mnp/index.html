<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tama — DTS Deployments</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; max-width: 800px; margin: 48px auto; padding: 0 24px; }
    h1 { font-size: 1.6rem; border-bottom: 2px solid #e0e0e0; padding-bottom: 12px; }
    .subtitle { color: #666; margin-top: -8px; margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    th { background: #2c3e50; color: #fff; padding: 12px 16px; text-align: left; font-size: 0.85rem; }
    td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    .badge-open   { background: #27ae60; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 0.78rem; }
    .badge-closed { background: #95a5a6; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 0.78rem; }
    .empty { text-align: center; color: #aaa; padding: 48px; }
  </style>
</head>
<body>
  <h1>DTS Deployments — Tama</h1>
  <p class="subtitle">Deployment history for Magma MES releases</p>
  <table>
    <thead>
      <tr>
        <th>Ticket</th>
        <th>Title</th>
        <th>Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <tr><td colspan="4" class="empty">No deployments yet.</td></tr>
    </tbody>
  </table>
</body>
</html>
