<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elcam — DTS Deployments</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', Arial, sans-serif; background: #eef2f8; color: #1a2340; min-height: 100vh; }

    .page-header { background: linear-gradient(180deg, #060d1f 0%, #0a1628 100%); border-bottom: 1px solid #1a2744; padding: 32px 40px 28px; position: relative; overflow: hidden; }
    .star-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .page-header::after { content: ''; position: absolute; top: -80px; left: 50%; transform: translateX(-50%); width: 700px; height: 400px; background: radial-gradient(ellipse, rgba(56,139,253,0.08) 0%, transparent 60%); pointer-events: none; }

    .header-inner { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
    .header-left { flex: 1; }

    .header-back { font-size: 11px; color: rgba(255,255,255,0.3); text-decoration: none; display: inline-block; margin-bottom: 16px; letter-spacing: 0.5px; transition: color 0.15s; }
    .header-back:hover { color: rgba(255,255,255,0.65); }

    .header-pill { display: inline-block; color: #fff; font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; }

    .header-title { font-size: 2.2rem; font-weight: 900; letter-spacing: -0.8px; line-height: 1.1; background: linear-gradient(135deg, #ffffff 30%, #8ab4d8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header-sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-top: 8px; }
    .header-rocket { font-size: 4.5rem; line-height: 1; flex-shrink: 0; filter: drop-shadow(0 0 20px rgba(255,200,50,0.3)); }

    main { max-width: 1100px; margin: 36px auto; padding: 0 28px 60px; }
    .table-wrap { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.04); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: linear-gradient(90deg, #0d1117, #161b22); }
    th { padding: 14px 18px; font-size: 0.68rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,0.55); text-align: left; white-space: nowrap; }
    th:first-child { border-left: 4px solid #0891b2; }
    td { padding: 15px 18px; border-bottom: 1px solid #eef2f8; font-size: 0.88rem; vertical-align: middle; color: #1a2340; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f7f9ff; }
    .ticket-link { font-weight: 800; text-decoration: none; font-size: 0.88rem; color: #0891b2; }
    .ticket-link:hover { text-decoration: underline; }
    .title-cell { max-width: 320px; font-weight: 500; }
    .na { color: #c8d5e8; }
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.4px; white-space: nowrap; }
    .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .badge-open      { background: #dcfce7; color: #15803d; } .badge-open::before { background: #4ade80; }
    .badge-scheduled { background: #fef9c3; color: #92400e; } .badge-scheduled::before { background: #fbbf24; }
    .badge-closed    { background: #f1f5f9; color: #64748b; } .badge-closed::before { background: #94a3b8; }
    .empty { text-align: center; color: #c8d5e8; font-size: 0.9rem; padding: 64px 24px; }
  </style>
</head>
<body>
  <div class="page-header">
    <canvas class="star-canvas"></canvas>
    <div class="header-inner">
      <div class="header-left">
        <div class="header-pill" style="background:#0891b2">Elcam</div>
        <div class="header-title">DTS Deployment History</div>
        <div class="header-sub">Magma MES releases for Elcam</div>
      </div>
      <div class="header-rocket">🚀</div>
    </div>
  </div>
  <main>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Ticket</th>
            <th>Title</th>
            <th>Status</th>
            <th>Created</th>
            <th>Deploy Date</th>
            <th>Close Date</th>
            <th>Changes</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><a class="ticket-link" href="DTS_00002.html" target="_blank">DTS-DTS_00002</a></td>
            <td class="title-cell">DTS_00002 # Elcam # 08.07.2026</td>
            <td><span class="badge badge-scheduled">Scheduled</span></td>
            <td>08.07.2026</td>
            <td>20.08.2026</td>
            <td><span class="na">—</span></td>
            <td>2</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
  <script>(function(){var c=document.querySelector('.star-canvas');if(!c)return;var ctx=c.getContext('2d');function d(){c.width=c.offsetWidth;c.height=c.offsetHeight;for(var i=0;i<160;i++){ctx.beginPath();ctx.arc(Math.random()*c.width,Math.random()*c.height,Math.random()*1.3+.2,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,'+(Math.random()*.55+.15).toFixed(2)+')';ctx.fill();}}d();window.addEventListener('resize',d);})();</script>
</body>
</html>
