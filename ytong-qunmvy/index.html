<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ytong — DTS Deployments</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #f0f4ff;
      color: #1a2340;
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      background: linear-gradient(135deg, #1a2340 0%, #1e3a6e 100%);
      padding: 40px 40px 36px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle star dots */
    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.25) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px);
      background-size: 60px 60px, 97px 97px;
      background-position: 0 0, 30px 30px;
      pointer-events: none;
    }

    .header-inner {
      position: relative;
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
    }

    .header-back {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      display: block;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }
    .header-back:hover { color: rgba(255,255,255,0.75); }

    .header-customer {
      display: inline-block;
      background: #059669;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .header-title {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }

    .header-sub {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      margin-top: 6px;
    }

    .header-rocket {
      font-size: 4rem;
      opacity: 0.2;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ── Main content ── */
    main {
      max-width: 1100px;
      margin: 36px auto;
      padding: 0 28px 60px;
    }

    /* ── Table ── */
    .table-wrap {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: linear-gradient(90deg, #1a2340, #1e3a6e);
    }

    th {
      padding: 14px 18px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      text-align: left;
      white-space: nowrap;
    }

    th:first-child { border-left: 4px solid #059669; }

    td {
      padding: 16px 18px;
      border-bottom: 1px solid #f0f4ff;
      font-size: 0.88rem;
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f8faff; }

    .ticket-link {
      color: #059669;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .ticket-link:hover { text-decoration: underline; }

    .title-cell {
      max-width: 300px;
      color: #1a2340;
      font-weight: 500;
    }

    .na { color: #ccc; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      white-space: nowrap;
    }
    .badge-open      { background: #dcfce7; color: #166534; }
    .badge-scheduled { background: #fef9c3; color: #854d0e; }
    .badge-closed    { background: #f1f5f9; color: #64748b; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: #c5cfe8;
      font-size: 0.95rem;
      padding: 64px 24px;
    }
    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .toolbar-stats { font-size: 0.82rem; color: #64748b; font-weight: 600; }
    .toolbar-stats strong { color: #1a2340; font-weight: 800; }
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-pill { font-family: 'Heebo', Arial, sans-serif; font-size: 0.72rem; font-weight: 700; padding: 6px 14px; border-radius: 20px; border: 1px solid #e2e8f2; background: #fff; color: #64748b; cursor: pointer; transition: all 0.15s; }
    .filter-pill:hover { border-color: #c8d5e8; }
    .filter-pill.active { background: #1a2340; border-color: #1a2340; color: #fff; }
    .filter-count { opacity: 0.65; margin-left: 2px; }

    /* ── Deploy cards ── */
    .deploy-list { display: flex; flex-direction: column; gap: 14px; }
    .deploy-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05), 0 8px 20px rgba(0,0,0,0.04); border-left: 4px solid var(--accent, #059669); padding: 22px 26px; transition: transform 0.18s, box-shadow 0.18s; }
    .deploy-card:hover { transform: translateY(-3px); box-shadow: 0 4px 14px rgba(0,0,0,0.08), 0 16px 32px rgba(0,0,0,0.06); }
    .deploy-card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
    .deploy-id { font-size: 1.2rem; font-weight: 900; letter-spacing: -0.3px; color: #1a2340; }
    .deploy-title { font-size: 0.9rem; color: #475569; font-weight: 500; margin-bottom: 18px; }
    .deploy-meta { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding-top: 16px; border-top: 1px solid #f0f4ff; }
    .meta-col-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #94a3b8; margin-bottom: 4px; }
    .meta-col-value { font-size: 0.92rem; font-weight: 700; color: #1a2340; }
    .meta-col-value.na { color: #cbd5e1; font-weight: 400; }
    .deploy-footer { display: flex; justify-content: flex-end; margin-top: 16px; }
    .view-link { font-size: 0.8rem; font-weight: 700; color: var(--accent, #059669); text-decoration: none; }
    .view-link:hover { text-decoration: underline; }
    .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.4px; white-space: nowrap; }
    .badge-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: currentColor; }
    .empty-block { text-align: center; color: #c5cfe8; font-size: 0.95rem; padding: 64px 24px; background: #fff; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    @media (max-width: 640px) { .deploy-meta { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="header-inner">
      <div>
        <div class="header-customer">Ytong</div>
        <div class="header-title">DTS Deployment History</div>
        <div class="header-sub">Magma MES releases for Ytong</div>
      </div>
      <div class="header-rocket">🚀</div>
    </div>
  </div>

  <main>
    <div class="toolbar">
      <div class="toolbar-stats" id="toolbar-stats"></div>
      <div class="filter-bar" id="filter-bar"></div>
    </div>
    <div class="deploy-list" id="dts-list" style="--accent:#059669"></div>
  </main>

  <script src="../assets/dts-history.js"></script>
</body>
</html>
