<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magma MES — DTS Deployments</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      overflow: hidden;
      position: relative;
    }

    /* Starfield */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d) infinite ease-in-out;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--o); }
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    .rocket {
      font-size: 5rem;
      display: block;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .tagline {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .tagline em {
      color: #58a6ff;
      font-style: normal;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 10px 24px;
      font-size: 0.85rem;
      color: #8b949e;
    }

    .badge span {
      color: #3fb950;
      font-weight: 600;
    }

    footer {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      font-size: 0.72rem;
      color: #30363d;
    }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <div class="content">
    <span class="rocket">🚀</span>
    <h1>Houston, we have a deployment.</h1>
    <p class="tagline">
      This is Magma MES deployment central.<br />
      If you're looking for your release page — <em>you need the link.</em><br />
      If you don't have it, it's probably not for you. 👀
    </p>
    <div class="badge">
      System status: <span>All systems go</span> &nbsp;✓
    </div>
  </div>

  <footer>Magma Group &copy; 2026 — Internal Infrastructure</footer>

  <script>
    // Generate starfield
    const container = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        top: ${Math.random() * 100}%;
        left: ${Math.random() * 100}%;
        --d: ${(Math.random() * 4 + 2).toFixed(1)}s;
        --o: ${(Math.random() * 0.7 + 0.3).toFixed(2)};
        animation-delay: ${(Math.random() * 4).toFixed(1)}s;
      `;
      container.appendChild(s);
    }
  </script>

</body>
</html>
